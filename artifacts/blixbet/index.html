    <script>
      (function () {
        function isRealError(val) {
          return val instanceof Error || (val && typeof val === "object" && typeof val.stack === "string" && typeof val.message === "string");
        }
        window.addEventListener("unhandledrejection", function (e) {
          if (!isRealError(e.reason)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
        window.addEventListener("error", function (e) {
